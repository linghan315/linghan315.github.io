<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #080808;
  color: #b9b9b9;
  font-family: Consolas, monospace;
  padding: 40px 20px;
  line-height: 1.8;
  min-height: 100vh;
  overflow-x: hidden;
}
.container {
  max-width: 650px;
  margin: 0 auto;
}
.title {
  color: #884444;
  font-size: 24px;
  margin-bottom: 30px;
  font-weight: normal;
  animation: shakeTitle 4s 无限的 ease-in-out;
}
.date {
  颜色: #775555;
  边缘: 15PX 0 10PX;
  不透明度: 0.8;
}
.content {
  font-size: 15PX;
  white-space: pre-wrap;
  位置: relative;
}
.shake-text {
  动画: textShake 3.5s 无限的;
}
.flash-red {
  颜色：#bb5050；
  动画: flashRed 2.2s 无限的 交替;
}
.盖-黑色 {
  背景: #000;
  颜色: #000;
  padding: 0 3PX;
  用户选择: 没有一个;
}
.选择框 {
  边缘: 20PX 0;
  padding: 15PX;
  边境: 1PX 固体 #332222;
  背景：#0a0a0a；
  动画: figinFlash 5s 无限的;
}
.选择框 p {
  边缘: 8PX 0;
  颜色: #997777;
}
@keyframes textShake {
  0%,100% { 改变: 翻译(0PX,0PX) 歪斜(0deg,0deg); }
  25% { 改变: 翻译(0.5PX,1PX) 歪斜(0.5deg,0deg); }
  50% { 改变: 翻译(-1PX,0.5PX) 歪斜(-0.5deg,0.3deg); }
  75% { 改变: 翻译(1PX,-0.5PX) 歪斜(0.2deg,-0.2deg); }
}
@keyframes shakeTitle {
  0%,100% { 不透明度: 0.9; 改变: translateX(0); }
  50% { 不透明度: 1; 改变: translateX(1PX); }
}
@keyframes flashRed {
  从……起 { 不透明度: 0.6; }
  到 { 不透明度: 1; }
}
@keyframes figinFlash {
  0%,100% { 箱形阴影: 没有一个; }
  50% { 箱形阴影: 0 0 8PX #66222233; }
}
.闪黑 {
  位置: 确定的;
  顶端: 0;
  左: 0;
  宽度: 100%;
  高度: 100%;
  指针事件: 没有一个;
  背景: #000;
  不透明度: 0;
  Z指数: 999;
}
